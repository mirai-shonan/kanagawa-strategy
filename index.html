<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>チームみらい ポスティング大会＠神奈川</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --green:#0fa968;--green-light:#e6f7f0;--green-mid:#1d9e75;
  --dark:#0f1a13;--text:#1a1a1a;--muted:#6b7b6e;
  --border:#d4e8d8;--bg:#f5faf6;--white:#ffffff;--amber:#c07a10;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);font-size:14px;max-width:480px;margin:0 auto;min-height:100vh;}
.header{background:var(--dark);color:white;padding:16px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.logo{width:32px;height:32px;background:#95e3cd;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;color:white;}
.header-title{font-size:14px;font-weight:700;}
.header-sub{font-size:10px;color:rgba(255,255,255,.45);font-family:'DM Mono',monospace;margin-top:2px;}
.tabs{display:flex;gap:4px;}
.tab{flex:1;padding:7px 0;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.6);font-size:11px;font-family:'Noto Sans JP',sans-serif;cursor:pointer;text-align:center;}
.tab.active{background:#95e3cd;border-color:var(--green);color:white;font-weight:700;}
.section{display:none;padding:14px;}
.section.active{display:block;}
.summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
.summary-card{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:10px 8px;text-align:center;}
.summary-label{font-size:9px;color:var(--muted);margin-bottom:3px;}
.summary-value{font-size:20px;font-weight:900;color:var(--green-mid);font-family:'DM Mono',monospace;line-height:1;}
.summary-unit{font-size:10px;font-weight:400;color:var(--muted);}
.progress-wrap{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:11px;margin-bottom:12px;}
.progress-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
.progress-title{font-size:12px;font-weight:700;}
.progress-pct{font-size:13px;font-weight:900;color:var(--green-mid);font-family:'DM Mono',monospace;}
.progress-bar-bg{height:7px;background:#e8f5ec;border-radius:4px;overflow:hidden;}
.progress-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#0fa968,#95e3cd);transition:width .6s ease;}
.area-list-wrap{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.area-list-header{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
.area-block-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;}
.area-rows{display:none;padding:0 13px 4px;}
.area-rows.open{display:block;}
.progress-area-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f4f1;}
.progress-area-row:last-child{border-bottom:none;}
.achieved-badge{display:inline-flex;align-items:center;gap:3px;background:#dcfce7;color:#166534;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
.challenge-badge{display:inline-flex;align-items:center;gap:3px;background:#fef3c7;color:#92400e;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;animation:pulse 2s infinite;}
.banned-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:700;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:20px;white-space:nowrap;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.6;}}
.area-name-undone{font-size:13px;font-weight:700;color:var(--text);}
.ban-tag{display:inline-flex;font-size:9px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:5px;font-weight:700;margin-left:4px;}
.form-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:11px;}
.form-label{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;display:block;font-family:'DM Mono',monospace;letter-spacing:.06em;}
.form-select,.form-input{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);background:var(--bg);margin-bottom:11px;}
.form-select:focus,.form-input:focus{outline:none;border-color:var(--green-mid);}
.btn-submit{width:100%;padding:12px;background:var(--green-mid);color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.btn-submit:active{opacity:.85;}
.success-msg{background:var(--green-light);border:1px solid var(--green-mid);border-radius:9px;padding:11px 13px;font-size:12px;color:#0a3d22;margin-top:9px;display:none;}
.ranking-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f4f1;}
.ranking-item:last-child{border-bottom:none;}
.rank-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;flex-shrink:0;}
.rank-1{background:#ffd700;color:#7a5c00;}
.rank-2{background:#c0c0c0;color:#3a3a3a;}
.rank-3{background:#cd7f32;color:#fff;}
.rank-other{background:#f0f4f1;color:var(--muted);}
.rank-name{flex:1;font-size:13px;font-weight:700;}
.log-item{padding:7px 0;border-bottom:1px solid #f0f4f1;font-size:12px;}
.log-item:last-child{border-bottom:none;}
.log-meta{color:var(--muted);font-size:10px;font-family:'DM Mono',monospace;margin-bottom:1px;}
.admin-note{background:#fff3cd;border:1px solid #f5d87a;border-radius:10px;padding:11px 13px;margin-bottom:11px;font-size:11px;color:#7a5c00;line-height:1.6;}
.ban-list-item{display:flex;align-items:flex-start;justify-content:space-between;padding:9px 0;border-bottom:1px solid #f0f4f1;gap:8px;}
.ban-list-item:last-child{border-bottom:none;}
.ban-list-info{flex:1;}
.ban-list-name{font-size:12px;font-weight:700;}
.ban-list-period{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;margin-top:2px;}
.btn-del{padding:4px 10px;background:#fee2e2;color:#991b1b;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;}
.ban-active-badge{display:inline-block;background:#dc2626;color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;}
.ban-upcoming-badge{display:inline-block;background:#d97706;color:white;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;margin-left:4px;}
.ban-alert{background:#fff3cd;border:1px solid #f5d87a;border-radius:11px;padding:10px 12px;margin-bottom:12px;}
.ban-alert-title{font-size:11px;font-weight:700;color:#92400e;margin-bottom:5px;}
.ban-alert-item{font-size:11px;color:#7a5c00;padding:3px 0;border-bottom:1px solid rgba(245,216,122,.4);line-height:1.5;}
.ban-alert-item:last-child{border-bottom:none;}
.block-yokohama{background:#dbeafe;color:#1e40af;}
.block-kawasaki{background:#ede9fe;color:#5b21b6;}
.block-miura{background:#d1fae5;color:#065f46;}
.block-kennan{background:#fef3c7;color:#92400e;}
.block-shonan{background:#fce7f3;color:#9d174d;}
.block-seisou{background:#fed7aa;color:#9a3412;}
.suggest-group{padding:5px 12px 2px;font-size:10px;font-weight:700;color:var(--muted);font-family:'DM Mono',monospace;letter-spacing:.06em;background:var(--bg);}
.suggest-item{padding:9px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid #f0f4f1;}
.suggest-item:last-child{border-bottom:none;}
.suggest-item:hover{background:var(--green-light);color:var(--green-mid);}
.suggest-item.banned{color:#92400e;background:#fffbe6;}
.pin-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:3px 5px;line-height:1;opacity:.3;transition:all .15s;flex-shrink:0;border-radius:6px;}
.pin-btn.pinned{opacity:1;background:var(--green-light);}
.pinned-wrap{background:var(--green-light);border:1.5px solid var(--green-mid);border-radius:12px;overflow:hidden;margin-bottom:10px;}
.pinned-header{padding:9px 13px 5px;font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;letter-spacing:.06em;display:flex;align-items:center;gap:5px;}
.empty{text-align:center;padding:20px;color:var(--muted);font-size:12px;}
.loading-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.loading-screen .logo-big{width:56px;height:56px;background:#95e3cd;border-radius:14px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:28px;color:white;}
.loading-screen p{color:rgba(255,255,255,.6);font-size:12px;font-family:'DM Mono',monospace;}
</style>
</head>
<body>

<div class="loading-screen" id="loading-screen">
  <div class="logo-big">み</div>
  <p>データを読み込んでいます...</p>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">み</div>
    <div>
      <div class="header-title">ポスティング大会＠神奈川</div>
      <div class="header-sub">チームみらい ／ 4月末〆切</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('report',this)">報告</button>
    <button class="tab" onclick="showTab('list',this)">進捗</button>
    <button class="tab" onclick="showTab('ranking',this)">順位</button>
    <button class="tab" onclick="showTab('stamp',this)">スタンプ</button>
    <button class="tab" onclick="showTab('admin',this)">管理</button>
  </div>
</div>

<div class="section" id="sec-list">
  <div style="position:relative;margin-bottom:11px;">
    <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;">🔍</span>
    <input id="list-search" type="text" placeholder="市区町村名で検索..."
      style="width:100%;padding:10px 12px 10px 34px;border:1px solid var(--border);border-radius:10px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);background:var(--white);"
      oninput="onSearchInput()">
  </div>
  <div id="pinned-area"></div>
  <div id="list-content"><div class="empty">読み込み中...</div></div>
</div>

<div class="section active" id="sec-report">
  <div id="rpt-ban-alert"></div>
  <div id="rpt-summary"></div>
  <div class="form-card">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--dark);">ポスティング完了報告</div>
    <label class="form-label">あなたの名前<br><span style="font-weight:400;color:var(--muted);font-size:10px;">※できればオプチャまたはSlackで使用しているニックネームを入力してください（配布エリアに入力した名前が表示されます）</span></label>
    <input class="form-input" id="reporter-name" type="text" placeholder="例：みらい">
    <label class="form-label">エリア</label>
    <div style="position:relative;margin-bottom:11px;">
      <input class="form-input" id="area-search-input" type="text" placeholder="市区町村名で絞り込み..."
        style="margin-bottom:0;" autocomplete="off"
        oninput="filterAreaSuggest()" onfocus="filterAreaSuggest()" onblur="setTimeout(()=>hideSuggest(),180)">
      <input type="hidden" id="select-area" value="">
      <div id="area-suggest" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:0 0 10px 10px;max-height:220px;overflow-y:auto;z-index:50;box-shadow:0 4px 12px rgba(0,0,0,.08);"></div>
    </div>
    <label class="form-label">配布枚数</label>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:11px;">
      <input class="form-input" id="report-comment" type="number" min="1" placeholder="100" inputmode="numeric" style="margin-bottom:0;flex:1;">
      <span style="font-size:14px;font-weight:700;color:var(--text);white-space:nowrap;">枚</span>
    </div>
    <button class="btn-submit" onclick="submitReport()">完了報告を送る</button>
    <div class="success-msg" id="success-msg">✅ お疲れさまです！</div>
  </div>
  <div class="form-card" style="background:#fffbe6;border-color:#f5d87a;">
    <div style="font-size:11px;color:#7a5c00;line-height:1.7;"><strong>管理者の方へ：</strong>LINEで報告を受けた場合は代理入力してください。</div>
  </div>
</div>

<div class="section" id="sec-ranking">
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px;">
    <div style="font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;margin-bottom:10px;">配布枚数ランキング</div>
    <div id="ranking-list"><div class="empty">読み込み中...</div></div>
  </div>
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px;">
    <div style="font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;margin-bottom:8px;">最新の活動ログ</div>
    <div style="position:relative;margin-bottom:10px;">
      <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none;">🔍</span>
      <input id="log-search" type="text" placeholder="名前・エリアで検索..."
        style="width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:12px;color:var(--text);background:var(--bg);"
        oninput="renderRanking()">
    </div>
    <div id="log-list"><div class="empty">読み込み中...</div></div>
  </div>
</div>

<div class="section" id="sec-stamp">
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:11px;">
    <div style="font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;margin-bottom:6px;">あなたの名前</div>
    <input id="my-name-input" type="text" placeholder="ニックネームを入力..."
      style="width:100%;padding:8px 11px;border:1px solid var(--border);border-radius:9px;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:var(--text);background:var(--bg);"
      oninput="saveMyName()">
  </div>
  <div id="my-stamp-board"></div>
  <div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:13px;margin-top:11px;">
    <div style="font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;margin-bottom:2px;">みんなの進捗</div>
    <div style="font-size:10px;color:var(--muted);margin-bottom:12px;">チーム全体の獲得済みスタンプ</div>
    <div id="stamp-board"></div>
  </div>
</div>

<div class="section" id="sec-admin">
  <div class="admin-note">⚠️ <strong>管理者向け。</strong>選挙の告示日〜投票日を登録するとポスティング禁止期間として表示されます。</div>
  <div class="form-card">
    <div style="font-size:13px;font-weight:700;margin-bottom:12px;color:var(--dark);">禁止期間を追加</div>
    <label class="form-label">対象エリア</label>
    <select class="form-select" id="ban-block-sel" onchange="updateBanAreaSel()">
      <option value="">--- ブロック選択 ---</option>
    </select>
    <select class="form-select" id="ban-area-sel"><option value="">--- エリア選択 ---</option></select>
    <label class="form-label">禁止期間</label>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px;">
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;">開始日（告示日）</div>
      <input class="form-input" id="ban-start" type="date" style="margin-bottom:0;"></div>
      <div><div style="font-size:10px;color:var(--muted);margin-bottom:4px;">終了日（投票日）</div>
      <input class="form-input" id="ban-end" type="date" style="margin-bottom:0;"></div>
    </div>
    <label class="form-label">選挙名（任意）</label>
    <input class="form-input" id="ban-label" type="text" placeholder="例：茅ヶ崎市長選挙">
    <button class="btn-submit" onclick="addBan()">禁止期間を登録</button>
  </div>
  <div class="form-card">
    <div style="font-size:10px;font-weight:700;color:var(--green-mid);font-family:'DM Mono',monospace;margin-bottom:10px;">登録済み禁止期間</div>
    <div id="ban-list"><div class="empty">登録なし</div></div>
  </div>
</div>

<script>
const AREAS = [
  {block:'横浜地域',blockKey:'yokohama',areas:[
    {id:'y01',name:'横浜市鶴見区'},{id:'y02',name:'横浜市神奈川区'},
    {id:'y03',name:'横浜市西区'},{id:'y04',name:'横浜市中区'},{id:'y05',name:'横浜市南区'},
    {id:'y06',name:'横浜市保土ケ谷区'},{id:'y07',name:'横浜市旭区'},{id:'y08',name:'横浜市磯子区'},
    {id:'y09',name:'横浜市金沢区'},{id:'y10',name:'横浜市港北区'},{id:'y11',name:'横浜市緑区'},
    {id:'y12',name:'横浜市港南区'},{id:'y13',name:'横浜市瀬谷区'},{id:'y14',name:'横浜市泉区'},
    {id:'y15',name:'横浜市青葉区'},{id:'y16',name:'横浜市都筑区'},
    {id:'y17',name:'横浜市戸塚区'},{id:'y18',name:'横浜市栄区'},
  ]},
  {block:'川崎地域',blockKey:'kawasaki',areas:[
    {id:'k01',name:'川崎市川崎区'},{id:'k02',name:'川崎市幸区'},{id:'k03',name:'川崎市中原区'},
    {id:'k04',name:'川崎市高津区'},{id:'k05',name:'川崎市宮前区'},
    {id:'k06',name:'川崎市多摩区'},{id:'k07',name:'川崎市麻生区'},
  ]},
  {block:'横須賀三浦地域',blockKey:'miura',areas:[
    {id:'m01',name:'横須賀市'},{id:'m02',name:'鎌倉市'},
    {id:'m03',name:'逗子市'},{id:'m04',name:'三浦市'},{id:'m05',name:'葉山町'},
  ]},
  {block:'県央地域',blockKey:'kennan',areas:[
    {id:'n01',name:'相模原市'},{id:'n02',name:'厚木市'},{id:'n03',name:'大和市'},
    {id:'n04',name:'海老名市'},{id:'n05',name:'座間市'},
    {id:'n06',name:'綾瀬市'},{id:'n07',name:'愛川町'},{id:'n08',name:'清川村'},{id:'n09',name:'伊勢原市'},
  ]},
  {block:'湘南地域',blockKey:'shonan',areas:[
    {id:'s01',name:'平塚市'},{id:'s02',name:'藤沢市'},{id:'s03',name:'茅ヶ崎市'},
    {id:'s06',name:'寒川町'},{id:'s07',name:'大磯町'},{id:'s08',name:'二宮町'},
  ]},
  {block:'県西地域',blockKey:'seisou',areas:[
    {id:'w01',name:'小田原市'},{id:'w02',name:'南足柄市'},{id:'w03',name:'中井町'},{id:'w11',name:'秦野市'},
    {id:'w04',name:'大井町'},{id:'w05',name:'松田町'},{id:'w06',name:'山北町'},
    {id:'w07',name:'開成町'},{id:'w08',name:'箱根町'},{id:'w09',name:'真鶴町'},{id:'w10',name:'湯河原町'},
  ]},
];

const BLOCK_CSS = {
  '横浜地域':'block-yokohama','川崎地域':'block-kawasaki',
  '横須賀三浦地域':'block-miura','県央地域':'block-kennan',
  '湘南地域':'block-shonan','県西地域':'block-seisou'
};

const STAMPS = {
  y01:{e:'🌉',t:'鶴見区'}, y02:{e:'🏮',t:'神奈川区'}, y03:{e:'🎪',t:'西区'},
  y04:{e:'🎑',t:'中区'}, y05:{e:'🌸',t:'南区'},
  y06:{e:'🌳',t:'保土ケ谷区'}, y07:{e:'🌅',t:'旭区'}, y08:{e:'🏭',t:'磯子区'},
  y09:{e:'🦀',t:'金沢区'}, y10:{e:'🏟',t:'港北区'},

const areaIdToName = {};
AREAS.forEach(b=>b.areas.forEach(a=>{ areaIdToName[a.id]=a.name; }));
function allAreas(){ return AREAS.flatMap(b=>b.areas); }

let state = {logs:[], bans:[]};

const GAS_URL = 'https://script.google.com/macros/s/AKfycbwMevDHlUCShYp2jQdsNNIrvyiXCzOZWU1wSnJQ8hu6tOpqMtc3eealxY7wxKjf8DNK/exec';

async function gasRequest(body){
  const r = await fetch(GAS_URL, {
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain'},
    body: JSON.stringify(body)
  });
  return r;
}

async function loadState(){
  try{
    // no-corsではレスポンスが読めないのでGETで取得
    const r = await fetch(GAS_URL + '?action=loadState');
    const json = await r.json();
    if(json.ok && json.data) state = json.data;
    if(!state.bans) state.bans=[];
    if(!state.logs) state.logs=[];
  }catch(e){ console.log('load error:', e); }
}

async function saveState(){
  try{
    await fetch(GAS_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action:'saveState', state})
    });
  }catch(e){ console.log('save error:', e); }
}

function today(){ return new Date().toISOString().slice(0,10); }
function getActiveBan(id){ const t=today(); return state.bans.find(b=>b.areaId===id&&b.start<=t&&t<=b.end)||null; }
function getUpcomingBan(id){
  const t=today(), s=new Date(); s.setDate(s.getDate()+7);
  return state.bans.find(b=>b.areaId===id&&b.start>t&&b.start<=s.toISOString().slice(0,10))||null;
}
function fmtDate(s){ return s?s.replace(/-/g,'/'):''; }
function isDone(id){ return state.logs.some(l=>l.areaId===id); }
function areaLogs(id){ return state.logs.filter(l=>l.areaId===id); }
function countReporters(){ return new Set(state.logs.map(l=>l.reporter)).size; }
function parseCount(c){
  if(!c) return 0;
  const m=c.match(/(\d+)\s*[枚部冊]/); if(m) return parseInt(m[1]);
  const m2=c.match(/^(\d+)$/); if(m2) return parseInt(m2[1]);
  return 0;
}

async function addLog(areaId, areaName, reporter, comment){
  state.logs.unshift({id:Date.now().toString(), areaId, areaName, reporter, comment, time:new Date().toISOString()});
  await saveState(); renderAll();
}
async function deleteLog(logId){
  if(!confirm('この報告を削除しますか？')) return;
  state.logs = state.logs.filter(l=>l.id!==logId);
  await saveState(); renderAll();
}

      </div>`:''}
      ${!done&&!ban?`<div style="font-size:10px;color:var(--muted);margin-top:2px;">まだ誰も配布していません</div>`:''}
    </div>
    <div style="flex-shrink:0;">

function renderList(query=''){

function toggleListBlock(bi){

function renderRanking(){
  const pc={};
  state.logs.forEach(l=>{ const n=parseCount(l.comment); if(n>0) pc[l.reporter]=(pc[l.reporter]||0)+n; });
  const sorted=Object.entries(pc).sort((a,b)=>b[1]-a[1]), maxVal=sorted.length?sorted[0][1]:1;
  const rkEl=document.getElementById('ranking-list');
  rkEl.innerHTML=!sorted.length?'<div class="empty">報告時に枚数を入力すると集計されます</div>':sorted.map(([name,cnt],i)=>`
    <div class="ranking-item">
      <div class="rank-num ${i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other'}">${i+1}</div>
      <div class="rank-name">${name}</div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div style="width:70px;height:5px;background:#e8f5ec;border-radius:3px;overflow:hidden;"><div style="height:100%;border-radius:3px;background:#1d9e75;width:${Math.round(cnt/maxVal*100)}%;"></div></div>

  logEl.innerHTML=!filtered.length?`<div class="empty">「${q}」の記録が見つかりません</div>`:filtered.slice(0,50).map(l=>{
    const dt=new Date(l.time), ts=`${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,'0')}:${String(dt.getMinutes()).padStart(2,'0')}`;
    return `<div class="log-item" style="display:flex;align-items:flex-start;gap:8px;">

function renderBanAlert(){
  const t=today(), active=state.bans.filter(b=>b.start<=t&&t<=b.end);

  const upcoming=state.bans.filter(b=>b.start>t&&b.start<=sd.toISOString().slice(0,10));

  if(!active.length&&!upcoming.length){ el.innerHTML=''; return; }
  let items='';
  active.forEach(b=>{items+=`<div class="ban-alert-item">🚫 <strong>${areaIdToName[b.areaId]||b.areaId}</strong>${b.label?' 「'+b.label+'」':''}<span class="ban-active-badge">禁止中</span> ${fmtDate(b.start)}〜${fmtDate(b.end)}</div>`;});
  upcoming.forEach(b=>{items+=`<div class="ban-alert-item">⏰ <strong>${areaIdToName[b.areaId]||b.areaId}</strong>${b.label?' 「'+b.label+'」':''}<span class="ban-upcoming-badge">もうすぐ</span> ${fmtDate(b.start)}〜${fmtDate(b.end)}</div>`;});
  el.innerHTML=`<div class="ban-alert"><div class="ban-alert-title">⚠️ ポスティング禁止期間</div>${items}</div>`;
}

function filterAreaSuggest(){
  const q=document.getElementById('area-search-input').value.trim(), box=document.getElementById('area-suggest');
  let html='';
  AREAS.forEach(b=>{
    const matched=b.areas.filter(a=>!q||a.name.includes(q));
    if(!matched.length) return;
    html+=`<div class="suggest-group">${b.block}</div>`;
    matched.forEach(a=>{
      const ban=getActiveBan(a.id);
      html+=`<div class="suggest-item${ban?' banned':''}" onmousedown="selectArea('${a.id}','${a.name.replace(/'/g,"\\'")}',${!!ban})">${a.name}${ban?' 🚫':''}</div>`;
    });
  });
  box.innerHTML=html||'<div style="padding:10px 14px;font-size:12px;color:var(--muted);">見つかりません</div>';
  box.style.display='block';
}
function selectArea(id, name, banned){
  if(banned){ alert('🚫 禁止期間中のためポスティングできません'); return; }
  document.getElementById('select-area').value=id;
  document.getElementById('area-search-input').value=name;

function hideSuggest(){
  document.getElementById('area-suggest').style.display='none';
  const input=document.getElementById('area-search-input').value.trim();
  const selVal=document.getElementById('select-area').value;
  if(selVal){ const a=allAreas().find(a=>a.id===selVal); if(!a||a.name!==input) document.getElementById('select-area').value=''; }
}

async function submitReport(){
  const name=document.getElementById('reporter-name').value.trim();
  const areaId=document.getElementById('select-area').value;
  const num=document.getElementById('report-comment').value.trim();
  if(!name){ alert('名前を入力してください'); return; }
  if(!areaId){ alert('エリアを選択してください'); return; }
  const ban=getActiveBan(areaId); if(ban){ alert('🚫 禁止期間中'); return; }
  const area=allAreas().find(a=>a.id===areaId);
  await addLog(areaId, area.name, name, num?num+'枚':'');
  document.getElementById('reporter-name').value='';
  document.getElementById('report-comment').value='';
  document.getElementById('select-area').value='';
  document.getElementById('area-search-input').value='';
  const msg=document.getElementById('success-msg'); msg.style.display='block'; setTimeout(()=>msg.style.display='none',3000);
}

function updateBanAreaSel(){
  const bn=document.getElementById('ban-block-sel').value, sel=document.getElementById('ban-area-sel');
  sel.innerHTML='<option value="">--- エリア選択 ---</option>';
  if(!bn) return;
  AREAS.find(b=>b.block===bn)?.areas.forEach(a=>{ const o=document.createElement('option'); o.value=a.id; o.textContent=a.name; sel.appendChild(o); });
}
async function addBan(){
  const areaId=document.getElementById('ban-area-sel').value, start=document.getElementById('ban-start').value, end=document.getElementById('ban-end').value, label=document.getElementById('ban-label').value.trim();
  if(!areaId||!start||!end){ alert('エリアと日付を入力してください'); return; }
  if(start>end){ alert('開始日は終了日以前にしてください'); return; }
  state.bans.push({id:Date.now().toString(), areaId, start, end, label});
  await saveState(); renderBanList(); renderAll();
  ['ban-area-sel','ban-block-sel','ban-start','ban-end','ban-label'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  alert('✅ 禁止期間を登録しました');
}
async function deleteBan(id){
  if(!confirm('削除しますか？')) return;
  state.bans=state.bans.filter(b=>b.id!==id);
  await saveState(); renderBanList(); renderAll();
}
function renderBanList(){
  const el=document.getElementById('ban-list');
  if(!state.bans.length){ el.innerHTML='<div class="empty">登録なし</div>'; return; }
  const t=today();
  el.innerHTML=[...state.bans].sort((a,b)=>a.start.localeCompare(b.start)).map(b=>{
    const isA=b.start<=t&&t<=b.end, isP=b.end<t;
    const badge=isA?'<span class="ban-active-badge">禁止中</span>':isP?'<span style="font-size:9px;background:#f0f4f1;color:var(--muted);padding:1px 5px;border-radius:4px;font-weight:700;">終了</span>':'<span class="ban-upcoming-badge">予定</span>';
    return `<div class="ban-list-item"><div class="ban-list-info"><div class="ban-list-name">${areaIdToName[b.areaId]||b.areaId} ${badge}</div><div class="ban-list-period">${fmtDate(b.start)} 〜 ${fmtDate(b.end)}</div>${b.label?`<div style="font-size:10px;color:var(--amber);margin-top:2px;">${b.label}</div>`:''}</div><button class="btn-del" onclick="deleteBan('${b.id}')">削除</button></div>`;
  }).join('');
}

function showTab(t,btn){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.getElementById('sec-'+t).classList.add('active');
  if(btn) btn.classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderAll(){
  renderBanAlert(); renderSummary(); renderPinned();
  renderList(document.getElementById('list-search')?.value||'');
  renderRanking(); renderStamp(); renderBanList();
}

(async()=>{
  await loadState();
  renderAll();
  initForms();
  initMyName();
  document.getElementById('loading-screen').style.display='none';
})();
</script>
</body>
</html>
